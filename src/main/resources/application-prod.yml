spring:
  thymeleaf:
    cache: true
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          cache-public: true
          immutable: true

server:
  servlet:
    session:
      cookie:
        secure: true
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:20}

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: ERROR

app:
  performance:
    static-cache-days: ${STATIC_CACHE_DAYS:365}
