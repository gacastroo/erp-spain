spring:
  application:
    name: erp-spain

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/erp_spain?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid&useUnicode=true&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 10000
      validation-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Madrid
          batch_size: 30
        order_inserts: true
        order_updates: true
        format_sql: false
        query:
          in_clause_parameter_padding: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

  web:
    resources:
      cache:
        cachecontrol:
          max-age: ${STATIC_CACHE_MAX_AGE:1h}
          cache-public: true
      chain:
        cache: true
        compressed: true
        strategy:
          content:
            enabled: true
            paths:
              - /**

server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml
    min-response-size: 1024
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: strict
        secure: ${SESSION_COOKIE_SECURE:false}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

app:
  performance:
    static-cache-days: ${STATIC_CACHE_DAYS:30}
  security:
    remember-me-key: ${REMEMBER_ME_KEY:change-this-key-in-production}
    login-rate-limit:
      enabled: ${LOGIN_RATE_LIMIT_ENABLED:true}
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-minutes: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:15}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
