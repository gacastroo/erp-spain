spring:
  application:
    name: erp-spain

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/erp_spain?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Madrid
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: strict
        secure: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
